###############################################################################
# Bastion Pod Deployment
#
# This deployment creates a single pod that serves as a bastion shell
# for users to perform administrative tasks and to connect to the MySQL database
# which is only accessible from within the cluster. The pod is based on a
# lightweight Debian image with minimal tools installed, including the
# MariaDB MySQL client.
#
# setup:
# -------------------------------------
# - installs the MariaDB MySQL client
# - creates a welcome message with usage instructions and environment variable
#   information
# - configures the welcome message to be displayed whenever a user connects to
#   the pod
# - keeps the pod running indefinitely to allow users to connect and use the shell
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Values.app.name }}-bastion"
  namespace: "{{ .Values.namespace }}"
  annotations:
    meta.helm.sh/release-name: {{ .Values.app.name }}
    meta.helm.sh/release-namespace: {{ .Values.namespace }}
    meta.helm.sh/application-version: {{ .Chart.Version }}
  labels:
    App: {{ .Values.app.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "{{ .Values.app.name }}-bastion"
  template:
    metadata:
      labels:
        app: "{{ .Values.app.name }}-bastion"
    spec:
      affinity:
        {{- toYaml .Values.global.affinity | nindent 8 }}
      tolerations:
        {{- toYaml .Values.global.tolerations | nindent 8 }}
      volumes:
        - name: debian-setup-script
          configMap:
            name: debian-setup-script
            defaultMode: 0755
        - name: debian-welcome-banner
          configMap:
            name: debian-welcome-banner
            defaultMode: 0755
        - name: mysql-backup-script
          configMap:
            name: mysql-backup-script
            defaultMode: 0755
      containers:
        - name: "{{ .Values.app.name }}-bastion"
          image: ubuntu:latest
          workingDir: /home/
          command:
            - /bin/bash
            - -c
            - |
                set -e

                echo "Waiting for configMap mounts..."
                for i in $(seq 1 10); do
                  if [ -f /home/setup/install.sh ]; then break; fi
                  echo "Still waiting..."
                  sleep 1
                done

                ls -l /home/setup || true
                ls -l /home/welcome || true
                ls -l /home/backup || true

                /home/setup/install.sh
                /home/welcome/install.sh

                echo "The Smarter Bastion Server is ready to use!"

                while true; do sleep 3600; done
          imagePullPolicy: {{ .Values.global.image.pullPolicy | default "IfNotPresent" }}
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 512Mi
          volumeMounts:
            - name: debian-setup-script
              mountPath: /home/setup/install.sh
              subPath: install.sh
            - name: debian-welcome-banner
              mountPath: /home/welcome/install.sh
              subPath: install.sh
            - name: mysql-backup-script
              mountPath: /home/backup/backup-to-s3.sh
              subPath: backup-to-s3.sh

          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $env := .Values.app.env }}
            - name: {{ $env.name }}
              value: {{ $env.value | quote }}
            {{- end }}
