apiVersion: v1
kind: Secret
metadata:
  name: dockerhub-secret
  namespace: "{{ .Values.namespace }}"
  annotations:
    meta.helm.sh/release-name: "{{ .Values.global.appName }}"
    meta.helm.sh/release-namespace: "{{ .Values.namespace }}"
    meta.helm.sh/application-version: "{{ .Chart.Version }}"
  labels:
    helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    app.kubernetes.io/name: "{{ .Values.global.appName }}-worker"
    app.kubernetes.io/application-group: "{{ .Values.global.appName }}"
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf "{\"auths\":{\"https://index.docker.io/v1/\":{\"username\":\"%s\",\"password\":\"%s\",\"auth\":\"%s\"}}}" .Values.env.DOCKERHUB_USERNAME .Values.env.DOCKERHUB_PAT (printf "%s:%s" .Values.env.DOCKERHUB_USERNAME .Values.env.DOCKERHUB_PAT | b64enc) | b64enc }}
