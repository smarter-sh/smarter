###############################################################################
# Bastion Pod Deployment
#
# This deployment creates a single pod that serves as a bastion shell
# for users to perform administrative tasks and to connect to the MySQL database
# which is only accessible from within the cluster. The pod is based on a
# lightweight Debian image with minimal tools installed, including the
# MariaDB MySQL client.
#
# setup:
# -------------------------------------
# - installs the MariaDB MySQL client
# - creates a welcome message with usage instructions and environment variable information
# - keeps the pod running indefinitely to allow users to connect and use the shell
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Values.app.name }}-bastion"
  namespace: "{{ .Values.namespace }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "{{ .Values.app.name }}-bastion"
  template:
    metadata:
      labels:
        app: "{{ .Values.app.name }}-bastion"
    spec:
      affinity:
        {{- toYaml .Values.global.affinity | nindent 8 }}
      tolerations:
        {{- toYaml .Values.global.tolerations | nindent 8 }}
      containers:
        - name: "{{ .Values.app.name }}-bastion"
          image: debian:bullseye-slim
          command:
            - /bin/bash
            - -c
            - |
                set -e

                apt-get update
                apt-get install -y mariadb-client

                printf "%s\n" \
                  "echo ''" \
                  "echo '********************************************************************************'" \
                  "echo '*   Welcome to Smarter Bastion Shell!                                          *'" \
                  "echo '*   Pleases note the following:                                                *'" \
                  "echo '*   - mariadb mysql client is pre-installed.                                   *'" \
                  "echo '*   - all smarter pod environment variables are available.                     *'" \
                  "echo '*     see https://artifacthub.io/packages/helm/project-smarter/smarter         *'" \
                  "echo '*   - Admin documentation is available at https://docs.smarter.sh/             *'" \
                  "echo '*                                                                              *'" \
                  "echo '*   example usage:                                                             *'" \
                  "echo '*   \$ mysql -h \"\$SMARTER_MYSQL_HOST\" -u \"\$SMARTER_MYSQL_ROOT_USERNAME\" -p\"\$SMARTER_MYSQL_ROOT_PASSWORD\" \"\$SMARTER_MYSQL_DATABASE\"'" \
                  "echo '********************************************************************************'" \
                  "echo ''" \
                  > /etc/profile.d/welcome.sh

                chmod +x /etc/profile.d/welcome.sh
                grep -qxF 'if [[ $- == *i* ]]; then source /etc/profile.d/welcome.sh; fi' /etc/bash.bashrc || echo 'if [[ $- == *i* ]]; then source /etc/profile.d/welcome.sh; fi' >> /etc/bash.bashrc

                echo "Created the welcome message at /etc/profile.d/welcome.sh"
                cat /etc/profile.d/welcome.sh

                while true; do sleep 3600; done
          imagePullPolicy: {{ .Values.global.image.pullPolicy | default "IfNotPresent" }}
          resources:
            requests:
              cpu: 5m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 256Mi
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $env := .Values.app.env }}
            - name: {{ $env.name }}
              value: {{ $env.value | quote }}
            {{- end }}
