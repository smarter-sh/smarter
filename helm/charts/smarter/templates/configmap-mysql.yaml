# -----------------------------------------------------------------------------------
# ConfigMap Manifest for MySQL Init Scripts
#
# This file defines a ConfigMap containing MySQL initialization scripts for the Smarter app.
#
# - Maintainer: <your team/contact>
# - Purpose: Provides SQL scripts to initialize the MySQL database on startup.
# - Usage: Only rendered if mysql.enabled and mysql.initdbScripts are set in values.yaml.
# - Notes: Update or add scripts in values.yaml as needed for your environment.
#
# Note:
# The app.kubernetes.io/application-group label is used to identify pods to Calico
# and kubernetes_network_policy_v1 resources in order to allow pod-level communication
# between backing services. If the label is missing then the network policies are
# assured to PREVENT communication.
# -----------------------------------------------------------------------------------
{{- if and .Values.mysql.enabled .Values.mysql.initdbScripts }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: '{{ .Values.global.appName | default "smarter" }}-mysql-init-scripts'
  namespace: "{{ .Values.namespace }}"
  annotations:
    meta.helm.sh/release-name: "{{ .Values.global.appName }}"
    meta.helm.sh/release-namespace: "{{ .Values.namespace }}"
    meta.helm.sh/application-version: "{{ .Chart.Version }}"
  labels:
    app: '{{ .Values.global.appName | default "smarter" }}-{{ .Values.names.mysqlName | default "mysql" }}'
    app.kubernetes.io/application-group: "{{ .Values.global.appName }}"
data:
  {{- toYaml .Values.mysql.initdbScripts | nindent 2 }}
{{- end }}
