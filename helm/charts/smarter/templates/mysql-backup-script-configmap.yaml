apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-backup-script
data:
  backup-to-s3.sh: |
    #!/bin/bash
    set -e
    DATE=$(date +"%Y-%m-%d-%H%M%S")
    BACKUP_FILE="/tmp/${SMARTER_MYSQL_DATABASE}-${DATE}.sql"

    echo "Starting mysqldump..."
    mysqldump -h "$SMARTER_MYSQL_HOST" -u "$SMARTER_MYSQL_USER" -p"$SMARTER_MYSQL_PASSWORD" "$SMARTER_MYSQL_DATABASE" > "$BACKUP_FILE"

    echo "Uploading to S3..."
    aws s3 cp "$BACKUP_FILE" "s3://$SMARTER_S3_BUCKET/"

    echo "Backup complete: $BACKUP_FILE -> s3://$SMARTER_S3_BUCKET/"
    rm "$BACKUP_FILE"
