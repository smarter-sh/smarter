# -----------------------------------------------------------------------------------
# HorizontalPodAutoscaler Manifest for Smarter Application
#
# This file defines the HPA resource for the main Smarter app deployment.
#
# - Maintainer: <your team/contact>
# - Purpose: Automatically scales the app deployment based on CPU utilization.
# - Usage: Managed via Helm; values are set in values.yaml.
# - Notes: Adjust minReplicas, maxReplicas, and target utilization as needed.
#
# Important: labels are referenced by other resources, in this repo as well as
# external repos including https://github.com/smarter-sh/smarter-infrastructure.
# Do not arbitrarily change labels without updating all references.
# -----------------------------------------------------------------------------------
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Values.namespace }}
  annotations:
    meta.helm.sh/release-name: {{ .Values.app.name }}
    meta.helm.sh/release-namespace: {{ .Values.namespace }}
    meta.helm.sh/application-version: {{ .Chart.Version }}
  labels:
    helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    app.kubernetes.io/name: "{{ .Values.app.name }}-worker"
    app.kubernetes.io/application-group: {{ .Values.app.name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.app.name }}
  minReplicas: {{ .Values.hpa.minReplicas | default 2 }}
  maxReplicas: {{ .Values.hpa.maxReplicas | default 25 }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.targetCPUUtilizationPercentage | default 75 }}
