version: 2
updates:
  # Explicitly disable all pip (Python) updates
  - package-ecosystem: "pip"
    directory: "/smarter/requirements"
    open-pull-requests-limit: 0
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "*"
        update-types:
          [
            "version-update:semver-major",
            "version-update:semver-minor",
            "version-update:semver-patch",
          ]
  - package-ecosystem: "npm"
    directory: "/"
    labels:
      - "dependencies"
      - "javascript"
      - "automated pr"
    schedule:
      interval: "monthly"
    target-branch: "alpha"
    assignees:
      - "lpm0073"
    reviewers:
      - "lpm0073"
  - package-ecosystem: "github-actions"
    directory: "/.github"
    labels:
      - "dependencies"
      - "automated pr"
    schedule:
      interval: "monthly"
    target-branch: "alpha"
    assignees:
      - "lpm0073"
    reviewers:
      - "lpm0073"
  - package-ecosystem: "helm"
    directory: "/helm/charts/smarter"
    labels:
      - "dependencies"
      - "automated pr"
    assignees:
      - "lpm0073"
    reviewers:
      - "lpm0073"
    target-branch: "alpha"
    schedule:
      interval: "quarterly"
